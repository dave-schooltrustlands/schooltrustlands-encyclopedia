<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630">
  <rect width="1200" height="630" fill="#FAF9F6"/>
  <!-- Faint PLSS grid background, full bleed -->
  <g fill="none" stroke="#D8D1C2" stroke-width="1" opacity="0.5">
    <!-- 12×6 grid (~100px cells) -->
    <line x1="100" y1="0" x2="100" y2="630"/><line x1="200" y1="0" x2="200" y2="630"/>
    <line x1="300" y1="0" x2="300" y2="630"/><line x1="400" y1="0" x2="400" y2="630"/>
    <line x1="500" y1="0" x2="500" y2="630"/><line x1="600" y1="0" x2="600" y2="630"/>
    <line x1="700" y1="0" x2="700" y2="630"/><line x1="800" y1="0" x2="800" y2="630"/>
    <line x1="900" y1="0" x2="900" y2="630"/><line x1="1000" y1="0" x2="1000" y2="630"/>
    <line x1="1100" y1="0" x2="1100" y2="630"/>
    <line x1="0" y1="105" x2="1200" y2="105"/><line x1="0" y1="210" x2="1200" y2="210"/>
    <line x1="0" y1="315" x2="1200" y2="315"/><line x1="0" y1="420" x2="1200" y2="420"/>
    <line x1="0" y1="525" x2="1200" y2="525"/>
  </g>
  <!-- One section gold-filled (Section 16 echo, large, off-center) -->
  <rect x="900" y="105" width="100" height="105" fill="#B88A2E" opacity="0.35"/>
  <!-- Wordmark block -->
  <text x="80" y="280" font-family="Source Serif 4, Georgia, serif" font-weight="900" font-size="84" fill="#1F2A44" letter-spacing="-1.5">Schools of the Republic</text>
  <text x="80" y="335" font-family="Inter, sans-serif" font-weight="500" font-size="28" fill="#1D4F7C">A public library of America's school trust lands</text>
  <!-- Tagline at bottom -->
  <text x="80" y="540" font-family="Source Serif 4, Georgia, serif" font-style="italic" font-weight="600" font-size="32" fill="#17202A">America gave land to its schools.</text>
  <text x="80" y="582" font-family="Source Serif 4, Georgia, serif" font-style="italic" font-weight="600" font-size="32" fill="#17202A">This is the ledger of what happened next.</text>
</svg>
